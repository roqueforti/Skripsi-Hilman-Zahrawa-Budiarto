version: '3.8'

services:
  # 1. Container Database PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: sys_metrics_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: certimatch123
      POSTGRES_DB: certimatch_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Container Frontend Next.js
  web:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: sys_metrics_web
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:certimatch123@db:5432/certimatch_db?schema=public
      - PYTHON_API_URL=http://api:8000
    depends_on:
      - db
      - api

  # 3. Container Backend Python (Uvicorn)
  api:
    build: 
      context: .
      dockerfile: Dockerfile.api
    container_name: sys_metrics_api
    restart: always

  # 4. Container Cloudflare Tunnel
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: sys_metrics_agent
    restart: always
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    command: tunnel run
    depends_on:
      - web

volumes:
  postgres_data:
